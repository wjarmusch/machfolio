baseURL = "https://machfolio.com/"
locale = "en-us"
title = "MachFolio"
disableKinds = ["taxonomy", "term"]

[params]
  description = "Specs, comparisons, and owner-sourced verdicts for woodworking machinery."
  sheetCSV = "https://docs.google.com/spreadsheets/d/1rP3yuVYIA0NjGi7QDYF-it4TxI6BWr4El8GeyTS-FM4/export?format=csv&gid=0"

[contentAdapters]
  enableGoTemplates = true

[caches]
  [caches.getresource]
    # Dedupe the Google Sheet fetches within a single build. Each Cloudflare
    # deploy runs in a fresh container, so this never serves stale data across
    # deploys — it only avoids re-downloading the same CSV multiple times per build.
    maxAge = "10m"

[build]
  writeStats = true

[[module.mounts]]
  source = "assets"
  target = "assets"

[[module.mounts]]
  source = "static"
  target = "static"
