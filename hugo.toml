baseURL = "https://machfolio.com/"
locale = "en-us"
title = "MachFolio"
disableKinds = ["taxonomy", "term"]

[params]
  description = "Specs, comparisons, and owner-sourced verdicts for woodworking machinery."
  sheetCSV = "https://docs.google.com/spreadsheets/d/1rP3yuVYIA0NjGi7QDYF-it4TxI6BWr4El8GeyTS-FM4/export?format=csv&gid=0"

[contentAdapters]
  enableGoTemplates = true

[caches]
  [caches.getresource]
    maxAge = "0s"

[build]
  writeStats = true

[[module.mounts]]
  source = "assets"
  target = "assets"

[[module.mounts]]
  source = "static"
  target = "static"
